# ============================================================
# Celo GovAI Hub — Configuration File
# "Be up-to-date on the Celo Blockchain"
# ============================================================

bot:
  name: "Celo GovAI Hub"
  tagline: "Be up-to-date on the Celo Blockchain"
  admin_chat_id: ${ADMIN_CHAT_ID}

digest_schedule:
  timezone: "Europe/Madrid"
  time: "08:30"
  template: "daily"
  misfire_grace_time: 120

rss_feeds:
  - url: "https://blog.celo.org/feed"
    source: "Celo Blog"
    source_app: "CeloNetwork"
    category: "network"

  - url: "https://forum.celo.org/latest.rss"
    source: "Celo Forum"
    source_app: "CeloNetwork"
    category: "network"

  - url: "https://github.com/celo-org/celo-monorepo/releases.atom"
    source: "GitHub celo-monorepo"
    source_app: "CeloNetwork"
    category: "network"

  - url: "https://github.com/celo-org/celo-blockchain/releases.atom"
    source: "GitHub celo-blockchain"
    source_app: "CeloNetwork"
    category: "network"

  - url: "https://github.com/mento-protocol/mento-core/releases.atom"
    source: "GitHub Mento"
    source_app: "Mento"
    category: "defi"

  - url: "https://github.com/Ubeswap/ubeswap/releases.atom"
    source: "GitHub Ubeswap"
    source_app: "Ubeswap"
    category: "defi"

twitter_accounts:
  - handle: "CeloOrg"
    source_app: "CeloNetwork"
    category: "network"

  - handle: "MiniPay_"
    source_app: "MiniPay"
    category: "payments"

  - handle: "valoraapp"
    source_app: "Valora"
    category: "payments"

  - handle: "Ubeswap"
    source_app: "Ubeswap"
    category: "defi"

  - handle: "MentoProtocol"
    source_app: "Mento"
    category: "defi"

  - handle: "ImpactMarket"
    source_app: "ImpactMarket"
    category: "social"

  - handle: "toucanprotocol"
    source_app: "Toucan"
    category: "refi"

nitter_instances:
  - "https://xcancel.com"               # primary — whitelist-gated as of 2026-03
  - "https://nitter.poast.org"          # 403 as of 2026-03
  - "https://nitter.cz"                 # 403 as of 2026-03
  - "https://nitter.net"                # 404 as of 2026-03
  - "https://nitter.privacydev.net"     # down as of 2026-03

celo_rpc:
  primary: "https://forno.celo.org"
  fallback: "https://rpc.ankr.com/celo"
  timeout_seconds: 10
  # Alfajores testnet — swap primary/fallback below and use identity_registry commented above
  # testnet: "https://alfajores-forno.celo-testnet.org"   # chain_id: 44787

celo_contracts:
  cusd:  "0x765DE816845861e75A25fCA122bb6898B8B1282a"
  ceur:  "0xD8763CBa276a3738E6DE85b4b3bF5FDed6D6cA73"
  creal: "0xe8537a3d056DA446677B9E9d6c5dB704EaAb4787"
  celo:  "0x471EcE3750Da237f93B8E339c536989b8978a438"  # ✅ CELO ERC-20 CeloScan

coingecko:
  celo_id: "celo"
  ecosystem_category: "celo-ecosystem"
  cache_ttl_minutes: 30
  timeout_seconds: 10

defillama:
  chain: "Celo"
  cache_ttl_minutes: 30

groq:
  models:
    - "llama-3.3-70b-versatile"
    - "llama-3.1-8b-instant"
    - "mixtral-8x7b-32768"
  max_tokens_digest: 600
  max_tokens_ask: 200
  temperature: 0.3
  timeout_seconds: 30

cache:
  rss_ttl_minutes: 30
  twitter_ttl_minutes: 15
  market_ttl_minutes: 30
  onchain_ttl_minutes: 5
  snapshot_path: "data/cache/full_snapshot.json"
  market_path: "data/cache/market_cache.json"
  rss_path: "data/cache/rss_cache.json"

rate_limits:
  digest_manual_cooldown_minutes: 60
  ask_max_per_hour: 5
  ask_session_ttl_minutes: 10
  broadcast_msgs_per_second: 30

apps_available:
  payments:
    - minipay
    - valora
    - halofi
    - hurupay
  defi:
    - ubeswap
    - moola
    - mento
    - symmetric
    - mobius
    - knox
    - equalizer
    - uniswap_celo
  onramp:
    - celo_cashflow
    - unipos
  nfts:
    - octoplace
    - hypermove
    - truefeedback
  refi:
    - toucan
    - toucan_refi
  social:
    - impactmarket
    - masa
  network:
    - celo_network
    - celo_reserve

digest:
  max_items_per_category: 3
  max_context_tokens: 3000
  category_priority:
    - network
    - payments
    - defi
    - onramp
    - refi
    - social
    - nfts

logging:
  level: "INFO"
  file: "data/logs/bot.log"
  error_file: "data/logs/errors.log"
  max_bytes: 10485760
  backup_count: 5

health_check:
  interval_seconds: 60
  unhealthy_threshold: 2
  status_file: "data/status.json"

database:
  path: "data/uptocelo.db"
  url: "sqlite+aiosqlite:///data/uptocelo.db"

payment:
  celo_contract: "0x471EcE3750Da237f93B8E339c536989b8978a438"
  cusd_contract: "0x765DE816845861e75A25fCA122bb6898B8B1282a"
  min_celo_weekly: 0.3       # ~$0.50 USD equiv. 2026-03 + gas margin
  min_celo_monthly: 1.0      # ~$1.50 USD equiv.
  days_weekly: 7
  days_monthly: 30

erc8004:
  # Celo Mainnet — ERC-8004 Identity Registry (verified on celoscan.io)
  # https://celoscan.io/address/0x8004A169FB4a3325136EB29fA0ceB6D2e539a432
  identity_registry: "0x8004A169FB4a3325136EB29fA0ceB6D2e539a432"
  # Alfajores testnet equivalent (use with celo_rpc.testnet below):
  # identity_registry: "0x8004A818BFB912233c491871b3d84c89A494BD9e"
  agent_name: "Celo GovAI Hub"
  agent_description: "AI-powered Telegram bot delivering daily Celo blockchain digests. Monitors MiniPay, Valora, Ubeswap, Mento, ImpactMarket and more. Premium subscriptions paid in CELO"
  agent_endpoint: "https://t.me/CeloGovAI_bot"
  chain_id: 42220
